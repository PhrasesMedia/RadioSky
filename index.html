<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadioSky</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html { height:100%; }
  body { background:#020b18; font-family:'Share Tech Mono',monospace,monospace; overflow:hidden; height:100vh; width:100vw; }
  canvas { display:block; width:100%; height:100%; }

  /* Toggle */
  #toggle-wrap {
    position:fixed; top:20px; left:50%; transform:translateX(-50%);
    z-index:20; display:flex; flex-direction:column; align-items:center; gap:10px;
  }
  #toggle-btn-row {
    display:flex; background:rgba(2,11,24,0.92);
    border:1px solid rgba(0,245,160,0.25); border-radius:6px; overflow:hidden;
  }
  .tbtn {
    padding:10px 28px; cursor:pointer; font-family:'Share Tech Mono',monospace;
    font-size:0.68rem; letter-spacing:0.18em; border:none; background:transparent;
    color:rgba(0,195,245,0.5); transition:all 0.3s; white-space:nowrap;
  }
  .tbtn.active { background:rgba(0,245,160,0.12); color:#00f5a0; text-shadow:0 0 12px rgba(0,245,160,0.7); }
  .tbtn:hover:not(.active) { color:rgba(0,195,245,0.8); background:rgba(0,195,245,0.05); }
  .tdivider { width:1px; background:rgba(0,245,160,0.2); }

  #scenario-title {
    font-family:'Orbitron',sans-serif; font-weight:700;
    font-size:clamp(0.7rem,1.8vw,1.1rem); color:#00f5a0;
    letter-spacing:0.22em; text-align:center;
    text-shadow:0 0 20px rgba(0,245,160,0.6);
    opacity:0; transition:opacity 0.4s;
    pointer-events:none;
  }
  #scenario-title.show { opacity:1; }

  /* Flow bar */
  #flow-bar {
    position:fixed; bottom:0; left:0; right:0; height:48px;
    background:rgba(2,11,24,0.94); border-top:1px solid rgba(0,245,160,0.12);
    display:flex; align-items:center; justify-content:center;
    z-index:10; overflow:hidden; transition:opacity 0.4s;
  }
  .fs { display:flex; align-items:center; gap:6px; padding:0 10px; font-size:0.58rem; letter-spacing:0.1em; color:rgba(0,195,245,0.75); white-space:nowrap; }
  .fd { width:7px; height:7px; border-radius:50%; flex-shrink:0; animation:db 2s ease-in-out infinite; }
  .fd.g  { background:#00f5a0; box-shadow:0 0 5px #00f5a0; }
  .fd.y  { background:#ffcc00; box-shadow:0 0 5px #ffcc00; animation-delay:0.4s; }
  .fd.b  { background:#00c3f5; box-shadow:0 0 5px #00c3f5; animation-delay:0.8s; }
  .fd.r  { background:#ff6060; box-shadow:0 0 5px #ff6060; animation-delay:1.2s; }
  @keyframes db { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .fa { color:rgba(0,245,160,0.28); font-size:0.85rem; }

  /* Fade overlay for scene transition */
  #fade {
    position:fixed; inset:0; background:#020b18;
    pointer-events:none; z-index:15; opacity:0; transition:opacity 0.25s;
  }
  #fade.on { opacity:1; }

  /* Info popup */
  #popup {
    position:fixed; z-index:30; pointer-events:none;
    max-width:260px; min-width:180px;
    background:rgba(2,11,24,0.97);
    border:1px solid rgba(0,245,160,0.4);
    border-radius:6px; padding:14px 16px;
    box-shadow:0 0 24px rgba(0,245,160,0.15);
    opacity:0; transform:translateY(6px);
    transition:opacity 0.2s, transform 0.2s;
  }
  #popup.visible { opacity:1; transform:translateY(0); pointer-events:auto; }
  #popup-title {
    font-family:'Orbitron',sans-serif; font-size:0.7rem; font-weight:700;
    color:#00f5a0; letter-spacing:0.18em; margin-bottom:8px;
    text-shadow:0 0 10px rgba(0,245,160,0.5);
  }
  #popup-body {
    font-size:0.62rem; line-height:1.6; color:rgba(180,220,255,0.85);
    letter-spacing:0.04em;
  }
  #popup-close {
    position:absolute; top:8px; right:10px;
    font-size:0.75rem; color:rgba(0,245,160,0.5); cursor:pointer;
    pointer-events:auto; line-height:1;
  }
  #popup-close:hover { color:#00f5a0; }

  /* Hint */
  #click-hint {
    position:fixed; bottom:60px; left:50%; transform:translateX(-50%);
    font-size:0.55rem; letter-spacing:0.2em; color:rgba(0,195,245,0.35);
    pointer-events:none; z-index:10; animation:hintFade 3s ease-in-out forwards;
  }
  @keyframes hintFade { 0%{opacity:0} 20%{opacity:1} 70%{opacity:1} 100%{opacity:0} }
</style>
</head>
<body>
<canvas id="scene"></canvas>
<div id="fade"></div>

<div id="popup">
  <div id="popup-close" onclick="closePopup()">✕</div>
  <div id="popup-title"></div>
  <div id="popup-body"></div>
</div>
<div id="click-hint">CLICK ON ANYTHING TO LEARN MORE</div>

<div id="toggle-wrap">
  <div id="toggle-btn-row">
    <button class="tbtn active" id="btn1" onclick="setScenario(1)">① LOCAL PLAYOUT</button>
    <div class="tdivider"></div>
    <button class="tbtn" id="btn2" onclick="setScenario(2)">② NETWORKED STATION</button>
    <div class="tdivider"></div>
    <button class="tbtn" id="btn3" onclick="setScenario(3)">③ TIELINE CODEC — NRL</button>
    <div class="tdivider"></div>
    <button class="tbtn" id="btn4" onclick="setScenario(4)">④ ISDN — STUDIO TO STUDIO</button>
    <div class="tdivider"></div>
    <button class="tbtn" id="btn5" onclick="setScenario(5)">⑤ DVN — LIVE GAME VISION</button>
    <div class="tdivider"></div>
    <button class="tbtn" id="btn6" onclick="setScenario(6)">⑥ DAB+ DIGITAL RADIO</button>
  </div>
  <div id="scenario-title" class="show"></div>
</div>

<div id="flow-bar"></div>

<script>
// ── POLYFILL: ctx.roundRect (not supported in older browsers) ─────────────────
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    if(typeof r==='object') r=r[0]||0;
    r=Math.min(r,w/2,h/2);
    this.moveTo(x+r,y);
    this.lineTo(x+w-r,y);
    this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r);
    this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h);
    this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r);
    this.quadraticCurveTo(x,y,x+r,y);
    this.closePath();
    return this;
  };
}

const canvas=document.getElementById('scene');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize(); window.addEventListener('resize',resize);

let t=0, scenario=1, transitioning=false;

// ── HELPERS ──────────────────────────────────────────────────────────────────

const stars=Array.from({length:200},()=>({x:Math.random(),y:Math.random()*0.64,r:Math.random()*1.4+0.3,b:Math.random(),s:Math.random()*0.4+0.2}));
const pkts=[];
function spawnPkt(fx,fy,tx,ty,c,delay=0){pkts.push({fx,fy,tx,ty,c,p:-delay,s:0.0028+Math.random()*0.003});}
function clearPkts(){pkts.length=0;}

function sky(){
  const g=ctx.createLinearGradient(0,0,0,H*0.74);
  g.addColorStop(0,'#010810');g.addColorStop(0.35,'#071525');g.addColorStop(0.65,'#0d2340');g.addColorStop(1,'#0c2818');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
}
function gnd(){
  const gy=H*0.74;
  const g=ctx.createLinearGradient(0,gy,0,H);
  g.addColorStop(0,'#0a1a06');g.addColorStop(0.3,'#0e2209');g.addColorStop(1,'#060f04');
  ctx.fillStyle=g;ctx.fillRect(0,gy,W,H-gy);
  const gl=ctx.createLinearGradient(0,gy-8,0,gy+50);
  gl.addColorStop(0,'rgba(0,245,160,0.05)');gl.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gl;ctx.fillRect(0,gy-8,W,58);
}
function drawStars(){
  stars.forEach(s=>{
    const f=0.5+0.5*Math.sin(t*s.s+s.b*9);
    ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,220,255,${0.35+0.5*f})`;ctx.fill();
  });
}
function moon(mx,my,r){
  ctx.save();
  const mg=ctx.createRadialGradient(mx-r*0.25,my-r*0.25,r*0.1,mx,my,r);
  mg.addColorStop(0,'#d0e0f0');mg.addColorStop(0.7,'#a0b8cc');mg.addColorStop(1,'#708090');
  ctx.fillStyle=mg;ctx.shadowColor='rgba(200,220,255,0.22)';ctx.shadowBlur=16;
  ctx.beginPath();ctx.arc(mx,my,r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.restore();
}

// Building
function building(cx,gy,floors,w,lit=true){
  const bh=floors*17,bx=cx-w/2,by=gy-bh;
  const bg=ctx.createLinearGradient(bx,by,bx+w,by);
  bg.addColorStop(0,'#1e3550');bg.addColorStop(0.5,'#142030');bg.addColorStop(1,'#1e3550');
  ctx.fillStyle=bg;ctx.fillRect(bx,by,w,bh);
  ctx.fillStyle='#1a3355';ctx.fillRect(bx-3,by,w+6,5);
  const cols=Math.floor(w/20);
  for(let r=0;r<floors-1;r++)for(let c=0;c<cols;c++){
    const wx=bx+6+c*20,wy=by+8+r*17;
    ctx.fillStyle=lit&&Math.sin(r*3.7+c*2.3+t*0.15)>0?'rgba(240,200,70,0.85)':'rgba(20,45,80,0.5)';
    ctx.fillRect(wx,wy,11,9);
  }
  ctx.fillStyle='rgba(0,0,0,0.22)';ctx.fillRect(bx+w-7,by,7,bh);
  return{bx,by,bw:w,bh,topY:by};
}

// Radio/Broadcast tower (tall lattice mast)
function mast(cx,baseY,h,color='#3a5a7a'){
  ctx.strokeStyle=color;ctx.lineWidth=2;
  const sections=7, sh=h/sections;
  for(let i=0;i<sections;i++){
    const y=baseY-i*sh, sp=(sections-i)*3;
    ctx.beginPath();ctx.moveTo(cx-sp,y);ctx.lineTo(cx+sp,y-sh);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+sp,y);ctx.lineTo(cx-sp,y-sh);ctx.stroke();
    ctx.strokeStyle='#2a4060';ctx.beginPath();ctx.moveTo(cx-sp,y);ctx.lineTo(cx+sp,y);ctx.stroke();
    ctx.strokeStyle=color;
  }
  ctx.beginPath();ctx.moveTo(cx,baseY);ctx.lineTo(cx,baseY-h);ctx.stroke();
  const g=0.5+0.5*Math.sin(t*2.2);
  ctx.beginPath();ctx.arc(cx,baseY-h,3.5,0,Math.PI*2);
  ctx.fillStyle=`rgba(255,60,60,${0.7+0.3*g})`;ctx.shadowColor='red';ctx.shadowBlur=8*g;ctx.fill();ctx.shadowBlur=0;
}

// Hill transmitter mast (on a hill shape)
function hillMast(cx,gy){
  // Hill
  ctx.fillStyle='#0e2209';
  ctx.beginPath();ctx.ellipse(cx,gy+5,90,40,0,Math.PI,0);ctx.fill();
  ctx.fillStyle='#112b0b';
  ctx.beginPath();ctx.ellipse(cx,gy+2,70,28,0,Math.PI,0);ctx.fill();
  // Mast on hill top
  const hillTopY=gy-34;
  mast(cx,hillTopY,95,'#4a6a8a');
  // STL dish on mast base
  ctx.save();ctx.translate(cx+8,hillTopY-10);ctx.rotate(-Math.PI*0.2);
  ctx.strokeStyle='#8ab0c0';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(0,0,12,Math.PI*0.1,Math.PI*0.9);ctx.stroke();
  ctx.beginPath();ctx.moveTo(Math.cos(Math.PI*0.1)*12,Math.sin(Math.PI*0.1)*12);
  ctx.lineTo(Math.cos(Math.PI*0.9)*12,Math.sin(Math.PI*0.9)*12);ctx.stroke();
  const gf=0.5+0.5*Math.sin(t*3+0.5);
  ctx.beginPath();ctx.arc(Math.cos(Math.PI*0.5)*8,Math.sin(Math.PI*0.5)*8,3,0,Math.PI*2);
  ctx.fillStyle='#00f5a0';ctx.shadowColor='#00f5a0';ctx.shadowBlur=6*gf;ctx.fill();ctx.shadowBlur=0;
  ctx.restore();
  return{topX:cx,topY:hillTopY-95};
}

// STL microwave link dish (small, on building roof)
function stlDish(cx,roofY,facingRight=true){
  const dir=facingRight?1:-1;
  ctx.save();ctx.translate(cx,roofY-8);
  ctx.strokeStyle='#90b0c0';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-14);ctx.stroke();
  ctx.translate(0,-14);ctx.rotate(dir*Math.PI*0.12);
  ctx.fillStyle='rgba(0,195,245,0.1)';ctx.strokeStyle='#90b0c0';
  ctx.beginPath();ctx.arc(0,0,11,dir*Math.PI*0.15,dir*Math.PI*0.85);ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.moveTo(Math.cos(dir*Math.PI*0.15)*11,Math.sin(dir*Math.PI*0.15)*11);
  ctx.lineTo(Math.cos(dir*Math.PI*0.85)*11,Math.sin(dir*Math.PI*0.85)*11);ctx.stroke();
  const g=0.5+0.5*Math.sin(t*3.2);
  const fx=Math.cos(dir*Math.PI*0.5)*7.5,fy=Math.sin(dir*Math.PI*0.5)*7.5;
  ctx.beginPath();ctx.arc(fx,fy,3,0,Math.PI*2);
  ctx.fillStyle='#00c3f5';ctx.shadowColor='#00c3f5';ctx.shadowBlur=6*g;ctx.fill();ctx.shadowBlur=0;
  ctx.restore();
}

// Uplink satellite dish (large, ground mounted)
function uplinkDish(cx,baseY,sc=1){
  ctx.save();ctx.translate(cx,baseY);
  ctx.fillStyle='#192819';ctx.fillRect(-14*sc,-2*sc,28*sc,5*sc);
  ctx.strokeStyle='#506070';ctx.lineWidth=4*sc;
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-26*sc);ctx.stroke();
  ctx.save();ctx.translate(0,-26*sc);ctx.rotate(-Math.PI*0.3);
  const dw=48*sc;
  const pts=[];
  for(let x=-dw;x<=dw;x+=2)pts.push([x,-(x*x)/(dw*1.7)]);
  ctx.strokeStyle='#8ab0d0';ctx.lineWidth=2*sc;ctx.fillStyle='rgba(0,180,255,0.07)';
  ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);pts.forEach(p=>ctx.lineTo(p[0],p[1]));
  ctx.lineTo(dw,-dw*0.35);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);pts.forEach(p=>ctx.lineTo(p[0],p[1]));ctx.stroke();
  ctx.beginPath();ctx.moveTo(-dw,pts[0][1]);ctx.lineTo(dw,pts[pts.length-1][1]);ctx.stroke();
  ctx.strokeStyle='#607080';ctx.lineWidth=1.2*sc;
  [0.35,0.7,0.92].forEach(r=>{
    ctx.beginPath();ctx.moveTo(0,-dw*0.04);ctx.lineTo(dw*r,pts[Math.floor(pts.length*(0.5+r*0.37))][1]);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,-dw*0.04);ctx.lineTo(-dw*r,pts[Math.floor(pts.length*(0.5-r*0.37))][1]);ctx.stroke();
  });
  const gl=0.5+0.5*Math.sin(t*3.5);
  ctx.beginPath();ctx.arc(0,-dw*0.04,5*sc,0,Math.PI*2);
  ctx.fillStyle='#ffcc00';ctx.shadowColor='#ffcc00';ctx.shadowBlur=10*gl*sc;ctx.fill();ctx.shadowBlur=0;
  ctx.restore();ctx.restore();
}

// Downlink receive dish on building roof
function recvDish(cx,roofY,sc=1){
  ctx.save();ctx.translate(cx,roofY);
  ctx.strokeStyle='#607070';ctx.lineWidth=2.5*sc;
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-18*sc);ctx.stroke();
  ctx.translate(0,-18*sc);ctx.rotate(-Math.PI*0.25);
  const dw=28*sc;
  const pts=[];
  for(let x=-dw;x<=dw;x+=2)pts.push([x,-(x*x)/(dw*1.6)]);
  ctx.fillStyle='rgba(0,195,245,0.1)';ctx.strokeStyle='#6090a0';ctx.lineWidth=2*sc;
  ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);pts.forEach(p=>ctx.lineTo(p[0],p[1]));
  ctx.lineTo(dw,-dw*0.35);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);pts.forEach(p=>ctx.lineTo(p[0],p[1]));ctx.stroke();
  ctx.beginPath();ctx.moveTo(-dw,pts[0][1]);ctx.lineTo(dw,pts[pts.length-1][1]);ctx.stroke();
  const gl=0.5+0.5*Math.sin(t*3+1);
  ctx.beginPath();ctx.arc(0,-dw*0.04,4*sc,0,Math.PI*2);
  ctx.fillStyle='#00c3f5';ctx.shadowColor='#00c3f5';ctx.shadowBlur=8*gl*sc;ctx.fill();ctx.shadowBlur=0;
  ctx.restore();
}

// Satellite in space
function satellite(sx,sy){
  ctx.save();ctx.translate(sx,sy);ctx.rotate(t*0.2);
  const pw=55,ph=12;
  const pg=ctx.createLinearGradient(-pw-12,0,pw+12,0);
  pg.addColorStop(0,'#0a3060');pg.addColorStop(0.3,'#1060c0');pg.addColorStop(0.5,'#2090ff');pg.addColorStop(0.7,'#1060c0');pg.addColorStop(1,'#0a3060');
  [-1,1].forEach(sd=>{
    ctx.fillStyle=pg;ctx.fillRect(sd*12,-ph/2,sd*pw,ph);
    ctx.strokeStyle='rgba(100,180,255,0.38)';ctx.lineWidth=0.5;
    for(let i=1;i<5;i++){ctx.beginPath();ctx.moveTo(sd*(12+pw*i/5),-ph/2);ctx.lineTo(sd*(12+pw*i/5),ph/2);ctx.stroke();}
    ctx.beginPath();ctx.moveTo(sd*12,0);ctx.lineTo(sd*(12+pw),0);ctx.stroke();
  });
  ctx.strokeStyle='#4080a0';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(-12,0);ctx.lineTo(-pw-12,0);ctx.stroke();
  ctx.beginPath();ctx.moveTo(12,0);ctx.lineTo(pw+12,0);ctx.stroke();
  const bg=ctx.createLinearGradient(-12,-14,12,14);
  bg.addColorStop(0,'#2a4a6a');bg.addColorStop(0.4,'#3a6080');bg.addColorStop(1,'#1a3040');
  ctx.fillStyle=bg;ctx.strokeStyle='#4090c0';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.roundRect(-12,-14,24,28,3);ctx.fill();ctx.stroke();
  ctx.fillStyle='rgba(100,200,255,0.25)';
  ctx.fillRect(-7,-10,14,4);ctx.fillRect(-7,-3,14,4);ctx.fillRect(-7,4,14,4);
  ctx.strokeStyle='#00c3f5';ctx.lineWidth=1.3;
  ctx.beginPath();ctx.moveTo(0,14);ctx.lineTo(0,22);ctx.stroke();
  ctx.beginPath();ctx.ellipse(0,22,9,3.5,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,195,245,0.15)';ctx.fill();ctx.stroke();
  [[8,-10,'#ffcc00'],[-8,-10,'#00f5a0']].forEach(([x,y,c])=>{
    const g=0.5+0.5*Math.sin(t*4+(x>0?0:1.5));
    ctx.beginPath();ctx.arc(x,y,2.2,0,Math.PI*2);
    ctx.fillStyle=c;ctx.shadowColor=c;ctx.shadowBlur=5*g;ctx.fill();ctx.shadowBlur=0;
  });
  ctx.restore();
}

// Animated beam
function beam(x1,y1,x2,y2,c1,c2,a,w=1.8){
  const g=ctx.createLinearGradient(x1,y1,x2,y2);
  const ca=(c,al)=>c.replace('rgb(','rgba(').replace(')',`,${al})`);
  g.addColorStop(0,ca(c1,a));g.addColorStop(0.5,ca(c2,a*0.3));g.addColorStop(1,ca(c1,a));
  ctx.save();ctx.strokeStyle=g;ctx.lineWidth=w;
  ctx.setLineDash([9,7]);ctx.lineDashOffset=-t*22;ctx.globalAlpha=a;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  ctx.setLineDash([]);ctx.globalAlpha=1;ctx.restore();
}

// Broadcast cone
function cone(sx,sy,rx,ry,rgb,a){
  const spread=70,dx=rx-sx,dy=ry-sy,len=Math.sqrt(dx*dx+dy*dy);
  const nx=-dy/len,ny=dx/len;
  ctx.save();
  const g=ctx.createLinearGradient(sx,sy,rx,ry);
  g.addColorStop(0,`rgba(${rgb},0)`);g.addColorStop(0.8,`rgba(${rgb},${a*0.05})`);g.addColorStop(1,`rgba(${rgb},${a*0.18})`);
  ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(sx,sy);
  ctx.lineTo(rx+nx*spread,ry+ny*spread);ctx.lineTo(rx-nx*spread,ry-ny*spread);
  ctx.closePath();ctx.fill();ctx.restore();
}

// Signal rings
function rings(cx,cy,color,sc=1){
  for(let i=0;i<3;i++){
    const ph=(t*1.5+i*0.4)%1,r=ph*42*sc,a=(1-ph)*0.45;
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle=color;ctx.globalAlpha=a;ctx.lineWidth=1.5;ctx.stroke();ctx.globalAlpha=1;
  }
}

// Ground cable / STL fibre
function groundLink(x1,y,x2,color,label=''){
  ctx.save();
  ctx.strokeStyle=color;ctx.lineWidth=2;
  ctx.setLineDash([10,6]);ctx.lineDashOffset=-(t*25)%30;
  ctx.beginPath();ctx.moveTo(x1,y);ctx.lineTo(x2,y);ctx.stroke();
  ctx.setLineDash([]);
  // Underground indicator
  ctx.strokeStyle=color.replace(/[\d.]+\)$/,'0.3)');ctx.lineWidth=6;
  ctx.beginPath();ctx.moveTo(x1,y+8);ctx.lineTo(x2,y+8);ctx.stroke();
  if(label){

// Car with person inside
function carWithPerson(cx,gy){
  ctx.save();ctx.translate(cx,gy);
  // Body
  ctx.fillStyle='#1a3040';ctx.fillRect(-22,-8,44,8);
  // Roof
  ctx.beginPath();ctx.moveTo(-18,-8);ctx.lineTo(-14,-16);ctx.lineTo(10,-16);ctx.lineTo(15,-8);ctx.closePath();ctx.fill();
  // Windows
  ctx.fillStyle='rgba(100,200,255,0.18)';ctx.fillRect(-12,-15,10,6);ctx.fillRect(1,-15,11,6);
  // Person silhouette in left window
  ctx.fillStyle='rgba(200,220,255,0.55)';
  ctx.beginPath();ctx.arc(-5,-12,3.5,0,Math.PI*2);ctx.fill(); // head
  ctx.fillRect(-7.5,-10,5,4); // body
  // Headlights
  const hl=0.7+0.3*Math.sin(t*10);
  ctx.beginPath();ctx.arc(21,-4,3,0,Math.PI*2);
  ctx.fillStyle=`rgba(255,240,150,${hl})`;ctx.shadowColor='rgba(255,240,100,0.8)';ctx.shadowBlur=10;ctx.fill();ctx.shadowBlur=0;
  // Antenna
  ctx.strokeStyle='#506070';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(-14,-16);ctx.lineTo(-14,-28);ctx.stroke();
  ctx.restore();
}

// House
function house(cx,gy){
  const bw=50,bh=36,bx=cx-bw/2,by=gy-bh;
  ctx.fillStyle='#142030';ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle='#0e1a28';ctx.beginPath();ctx.moveTo(cx-27,by);ctx.lineTo(cx,by-21);ctx.lineTo(cx+27,by);ctx.closePath();ctx.fill();
  ctx.fillStyle='#1a3550';ctx.fillRect(cx-5,by+19,10,bh-19);
  const wl=0.5+0.5*Math.sin(t*0.3+2);
  ctx.fillStyle=`rgba(240,200,60,${0.55+0.4*wl})`;
  ctx.fillRect(bx+5,by+6,12,10);ctx.fillRect(bx+33,by+6,12,10);
}

// Car
function car(cx,gy){
  ctx.save();ctx.translate(cx,gy);
  ctx.fillStyle='#1a3040';ctx.fillRect(-22,-8,44,8);
  ctx.beginPath();ctx.moveTo(-18,-8);ctx.lineTo(-14,-16);ctx.lineTo(10,-16);ctx.lineTo(15,-8);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(100,200,255,0.18)';ctx.fillRect(-12,-15,10,6);ctx.fillRect(1,-15,11,6);
  const hl=0.7+0.3*Math.sin(t*10);
  ctx.beginPath();ctx.arc(21,-4,3,0,Math.PI*2);
  ctx.fillStyle=`rgba(255,240,150,${hl})`;ctx.shadowColor='rgba(255,240,100,0.8)';ctx.shadowBlur=10;ctx.fill();ctx.shadowBlur=0;
  // antenna
  ctx.strokeStyle='#506070';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(-14,-16);ctx.lineTo(-14,-28);ctx.stroke();

}

// Label
function label(x,y,main,sub,mc,sc2){
  ctx.textAlign='center';
  ctx.font='bold 0.58rem "Share Tech Mono"';ctx.fillStyle=mc;ctx.fillText(main,x,y);
  if(sub){ctx.font='0.48rem "Share Tech Mono"';ctx.fillStyle=sc2||'rgba(0,195,245,0.42)';ctx.fillText(sub,x,y+12);}
}

// FM broadcast waves from mast top
function fmWaves(cx,ty){
  for(let i=0;i<4;i++){
    const ph=(t*1.2+i*0.3)%1;
    const r=ph*55;
    const a=(1-ph)*0.5;
    ctx.strokeStyle='rgba(0,245,160,0.8)';ctx.lineWidth=1.5;
    ctx.globalAlpha=a;
    // Half circle waves spreading out
    ctx.beginPath();ctx.arc(cx,ty,r,-Math.PI*0.7,Math.PI*0.7);ctx.stroke();
    ctx.beginPath();ctx.arc(cx,ty,r,Math.PI*0.3,Math.PI*1.7);ctx.stroke();
    ctx.globalAlpha=1;
  }
}

  const cX=W*0.84;

// ── SCENARIO 4: ISDN STUDIO-TO-STUDIO ────────────────────────────────────────

function drawScenario4(){
  const gy=H*0.74;

  // ── TELEPHONE EXCHANGE A (QLD) ───────────────────────────────────────────

  const exAx=W*0.31, exAy=gy;
  drawExchange(exAx, exAy, 'QLD EXCHANGE');

  // Cable: codec A → exchange A (underground)
  drawIsdnCable(cAx+28, cAy+8, exAx-22, exAy-50);

  // ── INTERSTATE ISDN BACKBONE (UNDERGROUND) ───────────────────────────────

  const midX=W*0.5;
  const l1h=H*0.06;
  const underY=gy+l1h*0.55; // sits in the topsoil/conduit layer

  // Vertical cable drops from exchanges — going down through soil into conduit
  [exAx, W-exAx].forEach(x=>{
    // Cable going from exchange building down through surface into ground
    ctx.save();
    ctx.strokeStyle='rgba(255,200,0,0.25)';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(x,gy-50);ctx.lineTo(x,underY);ctx.stroke();
    // Animated signal on cable
    ctx.strokeStyle='rgba(255,200,0,0.5)';ctx.lineWidth=1.5;
    ctx.setLineDash([5,4]);ctx.lineDashOffset=-t*18;
    ctx.beginPath();ctx.moveTo(x,gy-50);ctx.lineTo(x,underY);ctx.stroke();
    ctx.setLineDash([]);
    // Junction dot at conduit entry
    ctx.beginPath();ctx.arc(x,underY,5,0,Math.PI*2);
    ctx.fillStyle='rgba(255,200,0,0.7)';ctx.fill();
    // Surface entry point marker
    ctx.beginPath();ctx.arc(x,gy,3,0,Math.PI*2);
    ctx.fillStyle='rgba(255,200,0,0.4)';ctx.fill();
    ctx.restore();
    if(Math.random()<0.03) spawnPkt(x,gy-50,x,underY,'#ffcc00');

  ctx.strokeStyle='rgba(120,100,40,0.7)';ctx.lineWidth=16;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(exAx,underY);ctx.lineTo(W-exAx,underY);ctx.stroke();

  ctx.beginPath();ctx.moveTo(exAx,underY);ctx.lineTo(W-exAx,underY);ctx.stroke();

  // Fibre strand QLD→NSW
  ctx.strokeStyle='rgba(255,200,0,0.28)';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(exAx,underY-3);ctx.lineTo(W-exAx,underY-3);ctx.stroke();

  // Fibre strand NSW→QLD
  ctx.strokeStyle='rgba(255,160,0,0.28)';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(exAx,underY+3);ctx.lineTo(W-exAx,underY+3);ctx.stroke();

  // Animated signal on fibres
  ctx.strokeStyle='rgba(255,200,0,0.75)';ctx.lineWidth=1.5;
  ctx.setLineDash([10,7]);ctx.lineDashOffset=-t*32;
  ctx.beginPath();ctx.moveTo(exAx,underY-3);ctx.lineTo(W-exAx,underY-3);ctx.stroke();
  ctx.strokeStyle='rgba(255,160,0,0.75)';
  ctx.lineDashOffset=t*32;
  ctx.beginPath();ctx.moveTo(exAx,underY+3);ctx.lineTo(W-exAx,underY+3);ctx.stroke();
  ctx.setLineDash([]);

  // Conduit label
  ctx.textAlign='center';
  ctx.font='0.42rem "Share Tech Mono"';ctx.fillStyle='rgba(255,200,0,0.5)';
  ctx.fillText('ISDN BACKBONE — TELSTRA UNDERGROUND CONDUIT',midX,underY-14);
  ctx.font='0.36rem "Share Tech Mono"';ctx.fillStyle='rgba(255,200,0,0.28)';
  ctx.fillText('COPPER PAIRS / FIBRE  ·  DEDICATED CIRCUIT  ·  64 KBPS PER B-CHANNEL  ·  NO INTERNET',midX,underY+18);
  ctx.restore();

  // State border marker
  ctx.save();
  ctx.strokeStyle='rgba(255,160,0,0.18)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(midX,gy-H*0.08);ctx.lineTo(midX,underY+8);ctx.stroke();
  ctx.setLineDash([]);
  ctx.textAlign='center';ctx.font='0.4rem "Share Tech Mono"';
  ctx.fillStyle='rgba(255,160,0,0.32)';
  ctx.fillText('STATE BORDER',midX,gy-H*0.1);
  ctx.restore();

  // Packets along backbone (below ground)
  if(Math.random()<0.045) spawnPkt(exAx+5,underY-3, W-exAx-5,underY-3,'#ffcc00');
  if(Math.random()<0.045) spawnPkt(W-exAx-5,underY+3, exAx+5,underY+3,'#ffaa00');

  // ── ISDN DEFINITION PANEL ─────────────────────────────────────────────────

  ctx.save();ctx.translate(midX, H*0.28);
  ctx.fillStyle='rgba(2,11,24,0.88)';
  ctx.strokeStyle='rgba(255,200,0,0.25)';ctx.lineWidth=1;

  ctx.fillText('ISDN — INTEGRATED SERVICES DIGITAL NETWORK',0,-12);
  ctx.font='0.42rem "Share Tech Mono"';ctx.fillStyle='rgba(180,200,220,0.7)';
  ctx.fillText('A digital phone line that carries audio as data over the copper telephone network.',0,3);
  ctx.fillText('Circuit-switched — full bandwidth reserved for your call. No packets, no internet.',0,16);
  ctx.restore();

  const exBx=W-exAx, exBy=gy;
  drawExchange(exBx, exBy, 'NSW EXCHANGE');

  const bX=W*0.87;

  // Cable: exchange B → codec B
  drawIsdnCable(exBx+22, exBy-50, cBx-28, cBy+8);

  // ── PRESENTER CROSS INDICATOR ─────────────────────────────────────────────
  // No arc in the sky — the signal travels entirely underground through cables.
  // underY already declared above in backbone section

  // Highlight the full cable path with a subtle ground-level glow
  ctx.save();
  const pathGlow=0.12+0.06*Math.sin(t*1.5);
  ctx.strokeStyle=`rgba(255,200,0,${pathGlow})`;ctx.lineWidth=8;
  ctx.beginPath();
  ctx.moveTo(cAx+10, cAy+8);
  ctx.lineTo(cAx+10, gy);       // down from codec A to ground
  ctx.lineTo(exAx, gy);         // along ground to exchange A
  ctx.lineTo(exAx, underY);     // down into conduit
  ctx.lineTo(W-exAx, underY);   // along underground backbone
  ctx.lineTo(W-exAx, gy);       // up to exchange B
  ctx.lineTo(cBx-10, gy);       // along ground to studio B
  ctx.lineTo(cBx-10, cBy+8);    // up into codec B
  ctx.stroke();
  ctx.restore();

  // "LIVE CROSS" label — sits on the ground, not in the sky
  ctx.textAlign='center';ctx.font='bold 0.5rem "Share Tech Mono"';
  const liveP=0.5+0.5*Math.sin(t*3);
  ctx.fillStyle=`rgba(255,200,0,${0.65+0.3*liveP})`;
  ctx.shadowColor='rgba(255,200,0,0.5)';ctx.shadowBlur=8*liveP;
  ctx.fillText('⬡ LIVE CROSS — ALL UNDERGROUND',midX,gy-14);
  ctx.shadowBlur=0;

  // ISDN note — decommissioning warning
  ctx.save();ctx.translate(midX,H*0.62);
  ctx.fillStyle='rgba(255,80,60,0.12)';
  ctx.strokeStyle='rgba(255,80,60,0.3)';ctx.lineWidth=1;
  ctx.beginPath();ctx.roundRect(-145,-16,290,32,4);ctx.fill();ctx.stroke();
  ctx.font='0.44rem "Share Tech Mono"';ctx.fillStyle='rgba(255,100,80,0.75)';ctx.textAlign='center';
  ctx.fillText('⚠  ISDN IS BEING DECOMMISSIONED BY TELCOS',0,0);
  ctx.font='0.37rem "Share Tech Mono"';ctx.fillStyle='rgba(255,100,80,0.5)';
  ctx.fillText('STATIONS NOW MOVING TO IP CODECS (e.g. TIELINE) OVER BROADBAND',0,12);
  ctx.restore();

  // Packets underground
  pkts.forEach((p,i)=>{
    if(p.p<0){p.p+=p.s;return;}
    p.p+=p.s;if(p.p>1){pkts.splice(i,1);return;}
    const px=p.fx+(p.tx-p.fx)*p.p,py=p.fy+(p.ty-p.fy)*p.p;
    ctx.beginPath();ctx.arc(px,py,3,0,Math.PI*2);
    ctx.fillStyle=p.c;ctx.shadowColor=p.c;ctx.shadowBlur=7;ctx.fill();ctx.shadowBlur=0;
  });
}

// ISDN Codec unit
function drawIsdnCodec(cx,cy,label){

// Cubic bezier point helper
function bezierPoint(p0,p1,p2,p3,t){
  const mt=1-t;
  return mt*mt*mt*p0 + 3*mt*mt*t*p1 + 3*mt*t*t*p2 + t*t*t*p3;
}

    ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(muxX-44,muxY+(i-1.5)*14);ctx.stroke();
    ctx.strokeStyle=stationColors[i].replace('0.9','0.7');ctx.lineWidth=1.2;
    ctx.setLineDash([6,5]);ctx.lineDashOffset=-t*18;
    ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(muxX-44,muxY+(i-1.5)*14);ctx.stroke();
    ctx.setLineDash([]);
    if(Math.random()<0.035) spawnPkt(sx,sy,muxX-44,muxY+(i-1.5)*14,stationColors[i].replace('0.9','1'));
    ctx.restore();
  });

  // Contribution label
  ctx.save();ctx.translate(W*0.2,gy-72);
  ctx.font='0.38rem "Share Tech Mono"';ctx.fillStyle='rgba(150,190,220,0.4)';ctx.textAlign='center';
  ctx.fillText('CONTRIBUTION',0,-6);ctx.fillText('FEEDS (DVN/IP)',0,5);
  ctx.restore();

  // ── MULTIPLEXER ───────────────────────────────────────────────────────────
  ctx.save();ctx.translate(muxX,muxY);
  const mg=ctx.createLinearGradient(-44,-52,44,52);
  mg.addColorStop(0,'#0d2535');mg.addColorStop(1,'#071520');
  ctx.fillStyle=mg;ctx.strokeStyle='rgba(0,195,245,0.6)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.roundRect(-44,-52,88,104,5);ctx.fill();ctx.stroke();
  // Title
  ctx.font='bold 0.52rem "Share Tech Mono"';ctx.fillStyle='rgba(0,195,245,0.9)';ctx.textAlign='center';
  ctx.fillText('MULTI',0,-28);ctx.fillText('PLEXER',0,-16);
  // Incoming colour stripes funnelling in
  stationColors.forEach((c,i)=>{
    const stripY=-38+i*16;
    ctx.fillStyle=c.replace('0.9','0.25');
    ctx.fillRect(-42,stripY,30,12);
    ctx.font='0.35rem "Share Tech Mono"';ctx.fillStyle=c;ctx.textAlign='left';
    ctx.fillText(stationShort[i],-38,stripY+9);
  });
  // Arrow funnel
  ctx.strokeStyle='rgba(0,195,245,0.4)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(-10,-40);ctx.lineTo(16,0);ctx.lineTo(-10,40);ctx.stroke();
  // Output label
  ctx.font='0.38rem "Share Tech Mono"';ctx.fillStyle='rgba(0,195,245,0.6)';ctx.textAlign='center';
  ctx.fillText('MUX OUT',0,28);ctx.fillText('1×STREAM',0,39);
  // LEDs
  [0,1,2].forEach(i=>{
    const gl=0.5+0.5*Math.sin(t*4+i*1.1);
    ctx.beginPath();ctx.arc(-18+i*18,46,3,0,Math.PI*2);
    ctx.fillStyle=`rgba(0,245,160,${0.6+0.3*gl})`;ctx.shadowColor='#00f5a0';ctx.shadowBlur=4*gl;ctx.fill();ctx.shadowBlur=0;
  });
  ctx.restore();
  label(muxX,gy+18,'MULTIPLEXER','BUNDLES ALL STATIONS','rgba(0,195,245,0.85)','rgba(0,180,245,0.35)');

  // ── MUX → ENCODER ─────────────────────────────────────────────────────────
  const encX=W*0.52, encY=gy-72;
  ctx.save();
  ctx.strokeStyle='rgba(0,195,245,0.2)';ctx.lineWidth=6;
  ctx.beginPath();ctx.moveTo(muxX+44,muxY);ctx.lineTo(encX-36,encY);ctx.stroke();
  ctx.strokeStyle='rgba(0,195,245,0.8)';ctx.lineWidth=1.8;ctx.setLineDash([8,5]);ctx.lineDashOffset=-t*28;
  ctx.beginPath();ctx.moveTo(muxX+44,muxY);ctx.lineTo(encX-36,encY);ctx.stroke();
  ctx.setLineDash([]);
  if(Math.random()<0.06) spawnPkt(muxX+44,muxY,encX-36,encY,'#00c3f5');
  ctx.restore();

  // ── DAB+ ENCODER / EXCITER ────────────────────────────────────────────────
  ctx.save();ctx.translate(encX,encY);
  const eg=ctx.createLinearGradient(-36,-40,36,40);
  eg.addColorStop(0,'#1a2010');eg.addColorStop(1,'#0d1408');
  ctx.fillStyle=eg;ctx.strokeStyle='rgba(80,255,160,0.55)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.roundRect(-36,-40,72,80,4);ctx.fill();ctx.stroke();
  ctx.font='bold 0.48rem "Share Tech Mono"';ctx.fillStyle='rgba(80,255,160,0.9)';ctx.textAlign='center';
  ctx.fillText('DAB+',0,-20);ctx.fillText('ENCODER',0,-9);
  ctx.font='0.38rem "Share Tech Mono"';ctx.fillStyle='rgba(80,255,160,0.5)';
  ctx.fillText('HE-AAC',0,4);ctx.fillText('~200 MHz',0,14);
  // Spectrum display (little animated bars)
  for(let b=0;b<8;b++){
    const bh=6+6*Math.abs(Math.sin(t*5+b*0.8));
    ctx.fillStyle=`rgba(80,255,160,${0.4+0.3*Math.sin(t*3+b)})`;
    ctx.fillRect(-28+b*8,28-bh,6,bh);
  }
  ctx.restore();
  label(encX,gy+18,'DAB+ ENCODER','HE-AAC CODEC','rgba(80,255,160,0.85)','rgba(60,200,120,0.35)');

  // ── ENCODER → STL → TRANSMITTER MAST ─────────────────────────────────────
  const mastX=W*0.72, mastBaseY=gy;
  ctx.save();
  ctx.strokeStyle='rgba(80,255,160,0.2)';ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(encX+36,encY);ctx.lineTo(mastX-8,mastBaseY-50);ctx.stroke();
  ctx.strokeStyle='rgba(80,255,160,0.65)';ctx.lineWidth=1.5;ctx.setLineDash([8,5]);ctx.lineDashOffset=-t*22;
  ctx.beginPath();ctx.moveTo(encX+36,encY);ctx.lineTo(mastX-8,mastBaseY-50);ctx.stroke();
  ctx.setLineDash([]);
  ctx.font='0.38rem "Share Tech Mono"';ctx.fillStyle='rgba(80,255,160,0.35)';ctx.textAlign='center';
  ctx.fillText('STL LINK',W*0.625,gy-80);
  if(Math.random()<0.05) spawnPkt(encX+36,encY,mastX-8,mastBaseY-50,'#50ffa0');
  ctx.restore();

  // Transmitter mast on hill
  hillMast(mastX, mastBaseY);

  // VHF waves (wider spread than FM, same visual style)
  ctx.save();
  for(let r=1;r<=4;r++){
    const rad=r*28, waveFade=0.5-r*0.1, waveT=(t*1.2+r*0.4)%1;
    ctx.strokeStyle=`rgba(80,255,160,${waveFade*(1-waveT*0.5)})`;
    ctx.lineWidth=1.5-r*0.2;
    ctx.beginPath();
    ctx.arc(mastX,mastBaseY-95-74,rad*1.2,Math.PI*1.1,Math.PI*1.9);ctx.stroke();
    ctx.beginPath();
    ctx.arc(mastX,mastBaseY-95-74,rad*1.2,Math.PI*1.1+Math.PI,Math.PI*1.9+Math.PI);ctx.stroke();
  }
  ctx.restore();
  label(mastX,gy+18,'VHF TRANSMITTER','DAB+ BAND III','rgba(80,255,160,0.85)','rgba(60,200,120,0.35)');

  // ── DAB+ RADIO RECEIVER ───────────────────────────────────────────────────
  const carX=W*0.9, carY=gy;
  carWithPerson(carX, carY);

  // Radio display above car showing station list
  ctx.save();ctx.translate(carX-10,carY-68);
  ctx.fillStyle='rgba(5,15,25,0.92)';
  ctx.strokeStyle='rgba(0,195,245,0.4)';ctx.lineWidth=1;
  ctx.beginPath();ctx.roundRect(-46,-46,92,46,3);ctx.fill();ctx.stroke();
  // Screen header
  ctx.fillStyle='rgba(0,195,245,0.8)';ctx.font='bold 0.38rem "Share Tech Mono"';ctx.textAlign='center';
  ctx.fillText('DAB+ STATIONS',0,-32);
  // Station list on display
  stationShort.forEach((s,i)=>{
    const active=i===Math.floor((t*0.3)%stationShort.length);
    ctx.fillStyle=active?stationColors[i]:'rgba(150,180,200,0.4)';
    ctx.font=(active?'bold ':'')+'0.36rem "Share Tech Mono"';
    ctx.textAlign='left';
    ctx.fillText((active?'▶ ':' ')+s,-38,-18+i*12);
  });
  ctx.restore();
  label(carX,gy+18,'DAB+ RECEIVER','DIGITAL RADIO','rgba(0,195,245,0.85)','rgba(0,180,245,0.35)');

  // Signal path: mast → car
  ctx.save();
  const sigFade=0.18+0.08*Math.sin(t*1.8);
  ctx.strokeStyle=`rgba(80,255,160,${sigFade})`;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(mastX+10,mastBaseY-95-60);ctx.lineTo(carX-30,carY-40);ctx.stroke();
  if(Math.random()<0.04) spawnPkt(mastX+10,mastBaseY-95-60,carX-30,carY-40,'#50ffa0');
  ctx.restore();
}

const titles={
  1:'SCENARIO 1 — LOCAL PLAYOUT',
  2:'SCENARIO 2 — NETWORKED STATION',
  3:'SCENARIO 3 — TIELINE CODEC (NRL SIDELINE)',
  4:'SCENARIO 4 — ISDN STUDIO TO STUDIO',
  5:'SCENARIO 5 — DVN LIVE GAME VISION',
  6:'SCENARIO 6 — DAB+ DIGITAL RADIO'
};

function setScenario(n){
  if(n===scenario||transitioning)return;
  transitioning=true;
  const fade=document.getElementById('fade');
  fade.classList.add('on');
  setTimeout(()=>{
    scenario=n;
    clearPkts();
    document.getElementById('btn1').classList.toggle('active',n===1);
    document.getElementById('btn2').classList.toggle('active',n===2);
    document.getElementById('btn3').classList.toggle('active',n===3);
    document.getElementById('btn4').classList.toggle('active',n===4);
    document.getElementById('btn5').classList.toggle('active',n===5);
    document.getElementById('btn6').classList.toggle('active',n===6);
    document.getElementById('scenario-title').textContent=titles[n];
    updateFlowBar();
    fade.classList.remove('on');
    transitioning=false;
  },260);
}

updateFlowBar();

    body: 'Each station\'s audio is sent as a digital audio stream to the multiplexer, typically over Telstra\'s DVN or a dedicated managed IP circuit. The feed must be continuous and reliable — any dropout means dead air on that DAB station.'
  },
  s6_mux: {
    title: 'MULTIPLEXER (MUX)',
    body: 'The heart of DAB+. The multiplexer takes all the individual station audio feeds and encodes them together into a single combined digital data stream — the multiplex or "mux". In Australia, a typical metro mux carries 8–12 stations. The mux also carries metadata like station names, song titles and logos. Think of it like a post sorting office bundling multiple letters into one truck.'
  },
  s6_encoder: {
    title: 'DAB+ ENCODER / EXCITER',
    body: 'Encodes the multiplexed stream using the HE-AAC (High Efficiency AAC) audio codec and applies OFDM (Orthogonal Frequency Division Multiplexing) modulation — the transmission technique that makes DAB+ resilient to reflections and interference. The encoded signal is sent via an STL link to the transmitter mast.'
  },
  s6_mast: {
    title: 'VHF TRANSMITTER MAST',
    body: 'DAB+ transmits on VHF Band III — around 174–240 MHz in Australia, completely different from FM (87–108 MHz). The transmitter broadcasts the entire multiplex from one antenna — all 10+ stations simultaneously on one frequency. Coverage is typically metro-only in Australia; regional areas are still largely FM/AM.'
  },
  s6_radio: {
    title: 'DAB+ RADIO RECEIVER',
    body: 'Your DAB+ radio receives the full multiplex and decodes it. It displays a station list rather than frequencies — you never tune to a number, you just pick a name. The receiver decodes HE-AAC audio for whichever station you select. Because it\'s digital, you get perfect audio or nothing — no static or hiss. The receiver also shows text data: song title, artist, station logo and programme info sent alongside the audio.'
  }
};

// Hitboxes registered each frame
let hitboxes = [];

function registerHitbox(id, x, y, w, h) {
  hitboxes.push({id, x, y, w, h});
}

let activeHover = null;

// Popup state
let popupId = null;
function showPopup(id, mx, my) {
  const info = descriptions[id];
  if(!info) return;
  popupId = id;
  document.getElementById('popup-title').textContent = info.title;
  document.getElementById('popup-body').textContent = info.body;
  const popup = document.getElementById('popup');
  popup.classList.add('visible');
  positionPopup(mx, my);
}
function positionPopup(mx, my) {
  const popup = document.getElementById('popup');
  const pw = 260, ph = 120;
  let left = mx + 14;
  let top = my - 20;
  if(left + pw > W - 10) left = mx - pw - 14;
  if(top + ph > window.innerHeight - 60) top = window.innerHeight - 60 - ph;
  if(top < 90) top = 90;
  popup.style.left = left + 'px';
  popup.style.top = top + 'px';
}
function closePopup() {
  document.getElementById('popup').classList.remove('visible');
  popupId = null;
}

// Draw a subtle hover highlight
function drawHitboxHighlight(hb) {
  ctx.save();
  ctx.strokeStyle = 'rgba(0,245,160,0.55)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4,3]);
  ctx.strokeRect(hb.x, hb.y, hb.w, hb.h);
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(0,245,160,0.06)';
  ctx.fillRect(hb.x, hb.y, hb.w, hb.h);
  ctx.restore();
}

// Canvas click
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  for(const hb of hitboxes) {
    if(mx>=hb.x && mx<=hb.x+hb.w && my>=hb.y && my<=hb.y+hb.h) {
      showPopup(hb.id, e.clientX, e.clientY);
      return;
    }
  }
  closePopup();
});

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  let found = null;
  for(const hb of hitboxes) {
    if(mx>=hb.x && mx<=hb.x+hb.w && my>=hb.y && my<=hb.y+hb.h) { found=hb; break; }
  }
  activeHover = found ? found.id : null;
  canvas.style.cursor = found ? 'pointer' : 'default';
});

// Main draw loop
function draw() {
  hitboxes = [];
  ctx.clearRect(0,0,W,H);
  const gy=H*0.74, satX=W*0.5, satY=H*0.13;

  if(scenario===4){
    drawBackground4();
  } else if(scenario===5){
    drawBackground5();
  } else {
    sky(); drawStars();
    moon(W*0.9, H*0.09, 18);
    gnd();
  }

  if(scenario===1) {
    drawScenario1();
    const stuX=W*0.15;
    registerHitbox('s1_studio', stuX-55, H*0.74-5*17-10, 110, 5*17+10);
    const mastX=W*0.58;
    registerHitbox('s1_mast', mastX-55, H*0.74-74-95, 110, 170);
    registerHitbox('s1_stl', stuX+44, H*0.74-38, mastX-stuX-70, 30);
    const cX=W*0.84;
    registerHitbox('s1_listener', cX-38, H*0.74-36, 76, 50);
  } else if(scenario===2) {
    drawScenario2();
    const hqX=W*0.08;
    registerHitbox('s2_hq', hqX-55, H*0.74-7*17-10, 110, 7*17+10);
    const upX=W*0.3;
    registerHitbox('s2_uplink', upX-90, H*0.74-4*17-10, 180, 4*17+10);
    registerHitbox('s2_contriblink', hqX+44, H*0.74-40, upX-hqX-130, 30);
    registerHitbox('s2_satellite', satX-70, satY-30, 140, 80);
    const locX=W*0.72;
    registerHitbox('s2_localstation', locX-65, H*0.74-5*17-10, 130, 5*17+10);
    const mastX=W*0.89;
    registerHitbox('s2_mast', mastX-55, H*0.74-75-95, 110, 170);
    registerHitbox('s2_listener', W*0.96-38, H*0.74-36, 76, 50);
  } else if(scenario===3) {
    drawScenario3();
    const stadX=W*0.26;
    registerHitbox('s3_stadium', stadX-135, H*0.74-92, 270, 92);
    registerHitbox('s3_reporter', stadX+80, H*0.74-60, 50, 55);
    const codecX=stadX+145;
    registerHitbox('s3_codec', codecX-38, H*0.74-72, 76, 55);
    const routerX=stadX+220;
    registerHitbox('s3_router', routerX-32, H*0.74-68, 64, 55);
    registerHitbox('s3_network', W*0.62-55, H*0.35-32, 110, 62);
    const stuX=W*0.87;
    registerHitbox('s3_studio', stuX-55, H*0.74-6*17-10, 110, 6*17+10);
  } else if(scenario===4) {
    drawScenario4();
    const aX=W*0.13;
    registerHitbox('s4_studioA', aX-55, H*0.74-6*17-10, 110, 6*17+10);
    registerHitbox('s4_codecA', aX+10, H*0.74-6*17-48, 56, 32);
    const exAx=W*0.31;
    registerHitbox('s4_exchangeA', exAx-32, H*0.74-58, 64, 58);
    registerHitbox('s4_backbone', W*0.31+64, H*0.74-30, W*0.38-64, 26);
    const exBx=W-W*0.31;
    registerHitbox('s4_exchangeB', exBx-32, H*0.74-58, 64, 58);
    const bX=W*0.87;
    registerHitbox('s4_codecB', bX-66, H*0.74-6*17-48, 56, 32);
    registerHitbox('s4_studioB', bX-55, H*0.74-6*17-10, 110, 6*17+10);
  } else if(scenario===5) {
    drawScenario5();
    const stadX=W*0.17;
    registerHitbox('s5_stadium', stadX-65, H*0.74-86, 130, 86);
    registerHitbox('s5_cameras', stadX+54, H*0.74-52, 28, 28);
    const obX=W*0.32;
    registerHitbox('s5_ob', obX-52, H*0.74-66, 104, 56);
    const nodeAx=W*0.46;
    registerHitbox('s5_dvnNode', nodeAx-22, H*0.74-70, 44, 36);
    registerHitbox('s5_backbone', nodeAx+22, H*0.74-60, W*0.16-44, 20);
    const nodeBx=W*0.62;
    registerHitbox('s5_dvnLocal', nodeBx-22, H*0.74-70, 44, 36);
    const mcrX=W*0.82;
    registerHitbox('s5_mcr', mcrX-45, H*0.74-5*17-10, 90, 5*17+10);
    registerHitbox('s5_onair', W*0.95-28, H*0.74-5*17-30, 56, 28);
  } else {
    drawScenario6();
    registerHitbox('s6_studios', W*0.08-55, H*0.74-138, 110, 138);
    registerHitbox('s6_feeds', W*0.08+36, H*0.74-100, W*0.35*0.6, 80);
    const muxX=W*0.35;
    registerHitbox('s6_mux', muxX-44, H*0.74-124, 88, 104);
    const encX=W*0.52;
    registerHitbox('s6_encoder', encX-36, H*0.74-112, 72, 80);
    registerHitbox('s6_mast', W*0.72-55, H*0.74-95-74-30, 110, 200);
    registerHitbox('s6_radio', W*0.9-38, H*0.74-36, 76, 50);
  }

  // Draw hover highlight
  if(activeHover) {
    const hb = hitboxes.find(h=>h.id===activeHover);
    if(hb) drawHitboxHighlight(hb);
  }

  t+=0.016;
  requestAnimationFrame(draw);
}

draw();
</script>
